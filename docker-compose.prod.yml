# Production-oriented compose (reference). Not for local hot-reload.
#
# Usage (from repo root):
#   cp config/.env.production.example .env.production
#   # edit .env.production — set SECRET_KEY, POSTGRES_PASSWORD, BACKEND_CORS_ORIGINS, VITE_API_URL
#   docker compose -f docker-compose.prod.yml --env-file .env.production up --build -d
#
# Notes:
# - DB has no host port mapping; only reachable inside the compose network.
# - AUTH_DEV_LOGIN_ENABLED=false — use real auth (Phase 2) before exposing publicly.
# - Frontend image below still runs Vite dev server; for real prod, serve `frontend/dist` via nginx/CDN.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-myle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-myle}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      # If you change POSTGRES_USER / POSTGRES_DB, update this command to match.
      test: ["CMD-SHELL", "pg_isready -U myle -d myle"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    ports:
      - "${BACKEND_PUBLISH_PORT:-8000}:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://myle:myle@db:5432/myle}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY required}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:?BACKEND_CORS_ORIGINS required}
      AUTH_DEV_LOGIN_ENABLED: ${AUTH_DEV_LOGIN_ENABLED:-false}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PUBLISH_PORT:-5173}:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data_prod:
